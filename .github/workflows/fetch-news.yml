name: 에너지 뉴스 수집

on:
  schedule:
    # 매일 아침 8시 KST (= UTC 23:00 전날)
    - cron: '0 23 * * *'
    # 매일 오후 2시 KST (= UTC 05:00)
    - cron: '0 5 * * *'
  workflow_dispatch: # 수동 실행 가능

permissions:
  contents: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 뉴스 수집 실행
        run: python scripts/fetch_news.py

      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git diff --cached --quiet || git commit -m "📰 뉴스 데이터 업데이트 $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
