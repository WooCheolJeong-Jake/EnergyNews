<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Energy News Briefing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8fafc;
    --card-bg: #ffffff;
    --text: #0f172a;
    --text-mid: #475569;
    --text-sub: #94a3b8;
    --accent: #3b82f6;
    --accent-dark: #1d4ed8;
    --accent-light: #eff6ff;
    --priority: #f59e0b;
    --priority-dark: #d97706;
    --priority-light: #fffbeb;
    --border: #e2e8f0;
    --border-light: #f1f5f9;
    --shadow-sm: 0 1px 2px rgba(0,0,0,0.05);
    --shadow: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 6px -1px rgba(0,0,0,0.07), 0 2px 4px -2px rgba(0,0,0,0.05);
    --shadow-lg: 0 10px 15px -3px rgba(0,0,0,0.08), 0 4px 6px -4px rgba(0,0,0,0.04);
    --radius: 16px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── 헤더 ── */
  .header {
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 40%, #1d4ed8 100%);
    color: white;
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: radial-gradient(circle at 30% 50%, rgba(59,130,246,0.15) 0%, transparent 50%),
                radial-gradient(circle at 70% 80%, rgba(245,158,11,0.1) 0%, transparent 40%);
    pointer-events: none;
  }
  .header-content { position: relative; z-index: 1; }
  .header .logo {
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    margin-bottom: 0.5rem;
  }
  .header .logo-icon {
    width: 36px;
    height: 36px;
    background: rgba(255,255,255,0.15);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    backdrop-filter: blur(10px);
  }
  .header h1 {
    font-size: 1.75rem;
    font-weight: 700;
    letter-spacing: -0.03em;
  }
  .header .subtitle {
    font-size: 0.82rem;
    opacity: 0.7;
    margin-top: 0.3rem;
    font-weight: 400;
  }
  .header .stats {
    display: flex;
    justify-content: center;
    gap: 0.5rem;
    margin-top: 1.5rem;
  }
  .stat-card {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--radius-sm);
    padding: 0.7rem 1.2rem;
    min-width: 90px;
  }
  .stat-card .stat-num {
    font-size: 1.5rem;
    font-weight: 700;
    line-height: 1.2;
  }
  .stat-card .stat-label {
    font-size: 0.65rem;
    opacity: 0.6;
    font-weight: 500;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .header .update-info {
    margin-top: 1rem;
    font-size: 0.75rem;
    opacity: 0.5;
  }

  /* ── 필터 바 ── */
  .filter-bar {
    background: var(--card-bg);
    border-bottom: 1px solid var(--border);
    padding: 0.75rem 1.5rem;
    display: flex;
    gap: 0.4rem;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 100;
    -webkit-overflow-scrolling: touch;
    box-shadow: var(--shadow-sm);
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    padding: 0.4rem 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: 20px;
    background: transparent;
    color: var(--text-mid);
    font-size: 0.78rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
    font-family: inherit;
  }
  .filter-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: var(--accent-light);
  }
  .filter-btn.active {
    background: var(--accent);
    color: white;
    border-color: var(--accent);
    box-shadow: 0 2px 8px rgba(59,130,246,0.3);
  }
  .filter-btn.priority-filter.active {
    background: var(--priority);
    border-color: var(--priority);
    box-shadow: 0 2px 8px rgba(245,158,11,0.3);
  }

  /* ── 컨텐츠 ── */
  .container {
    max-width: 1280px;
    margin: 0 auto;
    padding: 1.2rem 1rem 4rem;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    color: var(--text-sub);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin: 1rem 0 0.3rem 0.3rem;
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .card-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.75rem;
  }
  @media (min-width: 640px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (min-width: 1024px) {
    .card-grid { grid-template-columns: repeat(3, 1fr); }
  }

  /* ── 카드 ── */
  .card {
    background: var(--card-bg);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 1.2rem 1.3rem;
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
    border: 1px solid var(--border-light);
    display: flex;
    flex-direction: column;
  }
  .card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
    border-color: var(--border);
  }
  .card.priority {
    border-left: 3px solid var(--priority);
    background: linear-gradient(135deg, var(--priority-light) 0%, var(--card-bg) 40%);
  }
  .card.priority:hover {
    border-color: var(--priority);
    border-left-color: var(--priority);
  }
  .card-top {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    margin-bottom: 0.6rem;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    padding: 0.2rem 0.6rem;
    border-radius: 6px;
    font-size: 0.65rem;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  .badge.category {
    background: var(--accent-light);
    color: var(--accent-dark);
  }
  .badge.priority-badge {
    background: var(--priority-light);
    color: var(--priority-dark);
  }
  .card-title {
    font-size: 0.92rem;
    font-weight: 600;
    line-height: 1.55;
    margin-bottom: 0.5rem;
    color: var(--text);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-title a {
    color: inherit;
    text-decoration: none;
    transition: color 0.15s;
  }
  .card-title a:hover {
    color: var(--accent);
  }
  .card-desc {
    font-size: 0.8rem;
    color: var(--text-mid);
    line-height: 1.6;
    margin-bottom: 0.8rem;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .card-meta {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.7rem;
    color: var(--text-sub);
    margin-top: auto;
    padding-top: 0.7rem;
    border-top: 1px solid var(--border-light);
  }
  .card-meta .source {
    font-weight: 600;
    color: var(--text-mid);
  }
  .card-meta .dot {
    color: var(--border);
    font-size: 0.4rem;
  }
  .card-meta .time-badge {
    margin-left: auto;
    background: var(--bg);
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.65rem;
  }

  /* ── 빈 상태 ── */
  .empty-state {
    text-align: center;
    padding: 5rem 1rem;
    color: var(--text-sub);
    grid-column: 1 / -1;
  }
  .empty-state .icon {
    font-size: 3rem;
    margin-bottom: 1rem;
    opacity: 0.5;
  }
  .empty-state p {
    font-size: 0.88rem;
    line-height: 1.7;
  }

  /* ── 로딩 ── */
  .loading {
    text-align: center;
    padding: 5rem 1rem;
    color: var(--text-sub);
  }
  .spinner {
    width: 36px;
    height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── 반응형 ── */
  @media (min-width: 768px) {
    .header { padding: 3rem 2rem 2.5rem; }
    .header h1 { font-size: 2rem; }
    .container { padding: 1.5rem 2rem 4rem; }
  }
  @media (max-width: 639px) {
    .stat-card { min-width: 80px; padding: 0.5rem 0.8rem; }
    .stat-card .stat-num { font-size: 1.2rem; }
  }

  /* ── 푸터 ── */
  .footer {
    text-align: center;
    padding: 1.5rem;
    color: var(--text-sub);
    font-size: 0.7rem;
    border-top: 1px solid var(--border-light);
    background: var(--card-bg);
  }

  /* ── 스크롤 탑 버튼 ── */
  .scroll-top {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--text);
    color: white;
    border: none;
    box-shadow: var(--shadow-lg);
    cursor: pointer;
    font-size: 1.1rem;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    z-index: 200;
  }
  .scroll-top:hover {
    transform: translateY(-2px);
    box-shadow: 0 12px 20px rgba(0,0,0,0.15);
  }
  .scroll-top.visible { display: flex; }
</style>
</head>
<body>

<div class="header">
  <div class="header-content">
    <div class="logo">
      <div class="logo-icon">E</div>
      <h1>Energy News Briefing</h1>
    </div>
    <div class="subtitle">전력시장 / ESS / 태양광 / VPP / RPS / AI / 제도개선 / 전기요금</div>
    <div class="stats">
      <div class="stat-card">
        <div class="stat-num" id="totalCount">-</div>
        <div class="stat-label">전체 기사</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="priorityCount">-</div>
        <div class="stat-label">VPP 주요</div>
      </div>
      <div class="stat-card">
        <div class="stat-num" id="categoryCount">-</div>
        <div class="stat-label">카테고리</div>
      </div>
    </div>
    <div class="update-info" id="updateInfo">데이터를 불러오는 중...</div>
  </div>
</div>

<div class="filter-bar" id="filterBar">
  <button class="filter-btn active" data-filter="all">전체</button>
  <button class="filter-btn priority-filter" data-filter="priority">VPP 주요</button>
</div>

<div class="container" id="container">
  <div class="loading">
    <div class="spinner"></div>
    <p>뉴스를 불러오는 중...</p>
  </div>
</div>

<div class="footer">
  Energy News Briefing &mdash; 자동 수집 by GitHub Actions
</div>

<button class="scroll-top" id="scrollTop" title="맨 위로">↑</button>

<script>
(function () {
  const DATA_URL = 'data/news.json';
  let allArticles = [];
  let currentFilter = 'all';

  async function loadData() {
    try {
      const resp = await fetch(DATA_URL + '?t=' + Date.now());
      if (!resp.ok) throw new Error('데이터 없음');
      const data = await resp.json();

      allArticles = data.articles || [];
      updateStats(data);
      buildFilters();
      renderCards();
    } catch (e) {
      document.getElementById('container').innerHTML =
        '<div class="empty-state"><div class="icon">📡</div>' +
        '<p>아직 수집된 뉴스가 없습니다.<br>GitHub Actions가 실행되면 자동으로 채워집니다.</p></div>';
      document.getElementById('updateInfo').textContent = '데이터 없음';
    }
  }

  function updateStats(data) {
    const total = allArticles.length;
    const priority = allArticles.filter(a => a.priority).length;
    const categories = new Set(allArticles.map(a => a.category));

    document.getElementById('totalCount').textContent = total;
    document.getElementById('priorityCount').textContent = priority;
    document.getElementById('categoryCount').textContent = categories.size;

    if (data.lastUpdated) {
      const d = new Date(data.lastUpdated);
      document.getElementById('updateInfo').textContent =
        '마지막 업데이트: ' + formatDateTime(d);
    }
  }

  function buildFilters() {
    const bar = document.getElementById('filterBar');
    const categories = [...new Set(allArticles.map(a => a.category))];

    categories.forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.filter = cat;
      btn.textContent = cat;
      bar.appendChild(btn);
    });

    bar.addEventListener('click', function (e) {
      if (!e.target.classList.contains('filter-btn')) return;
      bar.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentFilter = e.target.dataset.filter;
      renderCards();
    });
  }

  function renderCards() {
    const container = document.getElementById('container');
    let filtered = allArticles;

    if (currentFilter === 'priority') {
      filtered = allArticles.filter(a => a.priority);
    } else if (currentFilter !== 'all') {
      filtered = allArticles.filter(a => a.category === currentFilter);
    }

    if (filtered.length === 0) {
      container.innerHTML =
        '<div class="card-grid"><div class="empty-state"><div class="icon">📭</div>' +
        '<p>해당 카테고리의 기사가 없습니다.</p></div></div>';
      return;
    }

    let html = '<div class="card-grid">';

    const priorityArticles = filtered.filter(a => a.priority);
    const normalArticles = filtered.filter(a => !a.priority);

    if (priorityArticles.length > 0 && currentFilter !== 'priority') {
      html += '<div class="section-label">VPP 주요 기사</div>';
      priorityArticles.forEach(a => { html += cardHTML(a); });
    }

    if (normalArticles.length > 0 && currentFilter !== 'priority') {
      html += '<div class="section-label">최신 기사</div>';
      normalArticles.forEach(a => { html += cardHTML(a); });
    }

    if (currentFilter === 'priority') {
      priorityArticles.forEach(a => { html += cardHTML(a); });
    }

    html += '</div>';
    container.innerHTML = html;

    container.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function (e) {
        if (e.target.tagName === 'A') return;
        const link = this.dataset.link;
        if (link) window.open(link, '_blank');
      });
    });
  }

  function cardHTML(article) {
    const timeStr = article.pubDate ? timeAgo(new Date(article.pubDate)) : '';
    const dateStr = article.pubDate ? formatDateTime(new Date(article.pubDate)) : '';

    return `
      <div class="card ${article.priority ? 'priority' : ''}" data-link="${escapeHtml(article.link)}">
        <div class="card-top">
          <span class="badge category">${escapeHtml(article.category)}</span>
          ${article.priority ? '<span class="badge priority-badge">VPP 주요</span>' : ''}
        </div>
        <div class="card-title">
          <a href="${escapeHtml(article.link)}" target="_blank" rel="noopener">${escapeHtml(article.title)}</a>
        </div>
        ${article.description ? `<div class="card-desc">${escapeHtml(article.description)}</div>` : ''}
        <div class="card-meta">
          <span class="source">${escapeHtml(article.source)}</span>
          <span class="dot">●</span>
          <span class="time-badge" title="${dateStr}">${timeStr}</span>
        </div>
      </div>`;
  }

  function timeAgo(date) {
    const now = new Date();
    const diff = Math.floor((now - date) / 1000);
    if (diff < 60) return '방금 전';
    if (diff < 3600) return Math.floor(diff / 60) + '분 전';
    if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
    return Math.floor(diff / 86400) + '일 전';
  }

  function formatDateTime(date) {
    const m = date.getMonth() + 1;
    const d = date.getDate();
    const h = date.getHours();
    const min = String(date.getMinutes()).padStart(2, '0');
    return `${m}/${d} ${h}:${min}`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  const scrollBtn = document.getElementById('scrollTop');
  window.addEventListener('scroll', function () {
    scrollBtn.classList.toggle('visible', window.scrollY > 400);
  });
  scrollBtn.addEventListener('click', function () {
    window.scrollTo({ top: 0, behavior: 'smooth' });
  });

  loadData();
})();
</script>
</body>
</html>
